<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRC File Share</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input[type="file"] {
            margin: 1rem 0;
            width: 100%;
        }
        button {
            background-color: #00ff00;
            color: #121212;
            border: none;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { background-color: #00cc00; }
        #result {
            margin-top: 1.5rem;
            word-break: break-all;
            min-height: 20px;
        }
        a { color: #00ff00; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h2>>_ Upload to x0.at</h2>
        <input type="file" id="fileInput">
        <button id="uploadBtn" onclick="uploadFile()">Upload File</button>
        <div id="result"></div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('uploadBtn');

            if (fileInput.files.length === 0) {
                resultDiv.innerText = "Error: Please select a file first.";
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            // UI updates during upload
            btn.disabled = true;
            btn.innerText = "Uploading...";
            resultDiv.innerText = "Sending to x0.at...";

            try {
                // Sending the POST request to x0.at
                const response = await fetch('https://corsproxy.io/?https://x0.at/', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // x0.at returns the raw URL as text
                    const url = await response.text();
                    resultDiv.innerHTML = `Success! Link: <br><br><a href="${url.trim()}" target="_blank">${url.trim()}</a>`;
                } else {
                    resultDiv.innerText = `Upload failed. Server returned status: ${response.status}`;
                }
            } catch (error) {
                // Important Note: If x0.at blocks browser requests, it will trigger a CORS error here.
                resultDiv.innerText = `Upload Error: ${error.message}`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Upload File";
            }
        }
    </script>

</body>
</html>
